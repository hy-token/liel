# MkDocs — https://www.mkdocs.org/
# Theme — https://squidfunk.github.io/mkdocs-material/
#
# Synced into the public repo (`hy-token/liel`). `mkdocs serve` / `mkdocs build`
# are used locally; the public repo also runs **Deploy docs to GitHub Pages**
# (see `.github/workflows/docs-pages.yml` and CONTRIBUTING.md).

site_name: liel documentation
site_description: Single-file graph memory for local AI
site_author: hy-token
# GitHub Pages project site for repo `liel` (must match Settings -> Pages).
# `mkdocs serve` uses the same path prefix locally: http://127.0.0.1:8000/liel/
site_url: https://hy-token.github.io/liel/

repo_name: hy-token/liel
repo_url: https://github.com/hy-token/liel
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search:
      lang:
        - en

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

# Exclude maintainer-only material from the rendered site:
# - internal/**       : process / learn / rust-modules (Japanese maintainer docs)
# - **/*.ja.md        : Japanese sources (kept in liel-dev for maintainers,
#                       not shipped to hy-token/liel and not navigated to)
# - documentation-taxonomy.ja.md is covered by the **/*.ja.md rule.
exclude_docs: |
  internal/**
  **/*.ja.md

nav:
  - Home: index.md
  - Why liel: why-liel.md
  - Design:
      - Overview: design/index.md
      - Architecture: design/architecture.md
      - Single-writer guard: design/single-writer-guard.md
      - Product trade-offs: design/product-tradeoffs.md
  - Conventions:
      - Overview: conventions/index.md
      - Canonicalization: conventions/canonicalization.md
      - Recommended labels: conventions/recommended-labels.md
  - Behavior and specs:
      - Overview: reference/index.md
      - Capability matrix: reference/capability-matrix.md
      - Feature list: reference/features.md
      - Reliability and failure model: reference/reliability.md
      - Benchmarks and file size notes: reference/benchmarks.md
      - Format spec: reference/format-spec.md
      - CLI merge report (JSON): reference/cli-merge-report.md
      - CLI JSON inventory: reference/cli-json-inventory.md
      - Machine-readable surfaces: reference/json-surfaces.md
      - Viewer JSON contract: reference/viewer-json.md
      - Vector hybrid conventions: reference/vector-conventions.md
      - Schema profiles (optional): reference/schema-profiles.md
  - Samples:
      - Sample viewer (read-only): guide/sample-viewer.md
      - Example Python scripts: samples/example-scripts.md
  - Use liel:
      - Overview: guide/index.md
      - Quickstart: guide/quickstart.md
      - Command line: guide/cli.md
      - CI / GitHub Actions: guide/ci.md
      - APIs and integrations:
          - Overview: guide/connectors/index.md
          - Python: guide/connectors/python.md
      - MCP (AI integration):
          - Overview & quick start: guide/mcp/index.md
          - AI memory playbook: guide/mcp/agent-memory.md
          - Claude setup: guide/mcp/claude.md
          - Sample CLAUDE.md: guide/mcp/samples/CLAUDE.md
          - Tools reference: guide/mcp/tools.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hy-token/liel

copyright: Copyright &copy; hy-token
