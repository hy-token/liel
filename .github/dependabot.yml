# Keep Cargo, pip, and GitHub Actions dependencies up to date with weekly PRs.
# Grouping reduces PR noise: every ecosystem produces at most one PR per week
# unless a CVE forces an out-of-cycle update.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # PyO3 upgrades require deliberate binding API migration. Keep release
      # builds on the pinned version until that work is done deliberately.
      - dependency-name: pyo3
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
    groups:
      rust-deps:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # requirements-dev.txt intentionally keeps broad lower-bound ranges for
      # maintainer-only tooling. Local CI installs the latest allowed versions,
      # so Dependabot lower-bound bumps are noise rather than release inputs.
      - dependency-name: pytest
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: ruff
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: mkdocs
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: mkdocs-material
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: twine
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
    groups:
      python-dev-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      gha-deps:
        patterns:
          - "*"
