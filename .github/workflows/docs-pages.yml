# Build MkDocs and deploy to GitHub Pages (project site).
#
# Runs on hy-token/liel only (skipped on forks / liel-dev).
# Requires one-time repo setup: Settings -> Pages -> Source: GitHub Actions.
#
# Published URL (project pages): https://hy-token.github.io/liel/
# Must match mkdocs.yml `site_url`.
#
# Only `main` push (not `v*` tags): tagging the same commit as main would run
# this workflow twice with identical output.
#
# Path filter: rebuild Pages only when MkDocs inputs change. `workflow_dispatch`
# still runs a full deploy without path checks (manual refresh).
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "mkdocs_hooks.py"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'hy-token/liel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: python -m pip install --upgrade pip mkdocs-material

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.repository == 'hy-token/liel'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
