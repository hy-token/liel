# Build wheels (3 OS) + sdist and publish to TestPyPI / PyPI.
#
# Releases are manual on purpose. The workflow must be run from a v* tag
# whose name matches pyproject.toml (for example v0.2.0). A tag push alone
# never uploads to PyPI.
#
# Production publishing is allowed only from hy-token/liel. This workflow is
# also kept in liel-dev as a synced template, but the publish job is guarded.
# Required GitHub setup on hy-token/liel:
#   - Environments named testpypi and pypi
#   - PyPI / TestPyPI Trusted Publisher entries:
#     project: liel, owner: hy-token, repo: liel,
#     workflow: release-pypi.yml, environment: testpypi or pypi
#
# Version is read from pyproject.toml. For stable releases Cargo.toml must
# match it; for pre-releases pyproject.toml may add a PEP 440 suffix
# (for example 0.3.0a1) while Cargo.toml stays at the base version (0.3.0).

name: Build and publish Python package

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: testpypi

permissions:
  contents: read

jobs:
  release-metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      cargo_version: ${{ steps.version.outputs.cargo_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Read version from project files
        id: version
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          cargo = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          cargo_version = cargo["package"]["version"]
          if version != cargo_version and not version.startswith(cargo_version):
              raise SystemExit(
                  "pyproject.toml version must match Cargo.toml, or use Cargo.toml "
                  "as the base for a PEP 440 pre-release suffix"
              )
          print(f"version={version}")
          print(f"cargo_version={cargo_version}")
          PY

      - name: Verify release tag
        shell: bash
        run: |
          expected="v${{ steps.version.outputs.version }}"
          actual="${{ github.ref_name }}"
          if [[ "${{ github.ref_type }}" != "tag" || "$actual" != "$expected" ]]; then
            echo "This workflow must be run from tag $expected."
            echo "Current ref type: ${{ github.ref_type }}"
            echo "Current ref name: $actual"
            exit 1
          fi

      - name: Summarize release
        run: |
          echo "Version: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Cargo version: ${{ steps.version.outputs.cargo_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Target: ${{ github.event.inputs.target }}" >> "$GITHUB_STEP_SUMMARY"

  build-wheels:
    name: Build wheels ${{ needs.release-metadata.outputs.version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [release-metadata]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  build-sdist:
    name: Build sdist ${{ needs.release-metadata.outputs.version }}
    runs-on: ubuntu-latest
    needs: [release-metadata]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  twine-check:
    name: twine check
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install twine
        run: python -m pip install --upgrade pip twine

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          path: dist
          name: sdist

      - name: List artifacts
        run: ls -la dist

      - name: Validate metadata
        run: twine check dist/*

  install-smoke:
    name: Install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [build-wheels]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Install wheel in a clean venv
        shell: bash
        run: |
          python -m venv .venv-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-smoke/Scripts/python -m pip install --upgrade pip
            .venv-smoke/Scripts/python -m pip install --only-binary=:all: dist/*.whl
            .venv-smoke/Scripts/python -c "import liel; print(liel.__version__)"
          else
            .venv-smoke/bin/python -m pip install --upgrade pip
            .venv-smoke/bin/python -m pip install --only-binary=:all: dist/*.whl
            .venv-smoke/bin/python -c "import liel; print(liel.__version__)"
          fi

  publish:
    name: Publish ${{ needs.release-metadata.outputs.version }} to ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest
    needs: [release-metadata, twine-check, install-smoke]
    if: github.repository == 'hy-token/liel'
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ github.event.inputs.target == 'pypi' && 'pypi' || 'testpypi' }}
      url: ${{ github.event.inputs.target == 'pypi' && 'https://pypi.org/p/liel' || 'https://test.pypi.org/p/liel' }}
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          path: dist
          name: sdist

      - name: Publish to package index
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ github.event.inputs.target == 'testpypi' && 'https://test.pypi.org/legacy/' || '' }}

  publish-skipped:
    name: Publish (skipped on non-production repo)
    runs-on: ubuntu-latest
    needs: [twine-check, install-smoke]
    if: github.repository != 'hy-token/liel'
    steps:
      - name: Explain
        run: |
          echo "Skipping publish: this workflow can only upload from hy-token/liel."
          echo "Repository was: ${{ github.repository }}"
          echo "Artifacts have been built and validated for inspection."
