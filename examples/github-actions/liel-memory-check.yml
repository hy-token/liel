# Sample workflow: validate tracked `.liel` files in CI with `liel stats`.
#
# Copy this file to `.github/workflows/` in your repository (for example as
# `liel-memory-check.yml`). Adjust branch names and the pip version constraint
# to match your project.
#
# Guide: docs/guide/ci.md

name: Liel memory check

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install liel
        run: pip install "liel>=0.6.3,<1"

      - name: Run liel stats on tracked .liel files
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' f; do
            count=$((count + 1))
            echo "::group::liel stats -- $f"
            liel stats "$f" --format json
            echo "::endgroup::"
          done < <(git ls-files -z -- '*.liel')
          if [ "$count" -eq 0 ]; then
            echo "No tracked .liel files; nothing to check."
          fi
